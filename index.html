<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c18;
    --surface:   #0f1629;
    --surface2:  #0c1220;
    --border:    #1e2d50;
    --border2:   #2a3f6e;
    --amber:     #f59e0b;
    --amber-dim: #7c4f06;
    --green:     #10b981;
    --red:       #ef4444;
    --text:      #cbd5e1;
    --muted:     #475569;
    --mono:      'Share Tech Mono', monospace;
    --display:   'Chakra Petch', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--display); font-size: 13px; min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 0%,  rgba(245,158,11,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(16,185,129,0.03) 0%, transparent 50%);
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,22,41,0.92); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 30;
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: var(--amber); text-transform: uppercase; }
  .logo span { color: var(--text); font-weight: 400; }
  .header-sep { flex: 1; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    display: inline-block; margin-right: 6px; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-label { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 49px); }

  /* ── Search Panel ── */
  .panel { border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
  .panel-title { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber); margin-bottom: 14px; }

  /* ── Form ── */
  label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  input[type=text], input[type=date], input[type=number] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 13px;
    padding: 7px 10px; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--amber); }
  .field { margin-bottom: 12px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .radio-row { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .radio-row label { display: flex; align-items: center; gap: 5px; font-size: 11px; text-transform: none; letter-spacing: 0; cursor: pointer; color: var(--text); margin-bottom: 0; }
  input[type=radio] { accent-color: var(--amber); }

  /* ── Buttons ── */
  .btn { font-family: var(--display); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 9px 18px; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--amber); color: #000; width: 100%; margin-bottom: 8px; }
  .btn-primary:hover { background: #fbbf24; }
  .btn-primary:disabled { background: var(--amber-dim); color: #555; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); font-size: 11px; padding: 5px 10px; }
  .btn-ghost:hover { border-color: var(--amber); color: var(--amber); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); font-size: 11px; padding: 5px 10px; }
  .btn-danger:hover { background: var(--red); color: #fff; }

  /* ── Search status ── */
  .search-status { font-family: var(--mono); font-size: 11px; color: var(--muted); min-height: 20px; margin-bottom: 6px; }
  .search-status.searching { color: var(--amber); }
  .search-status.done  { color: var(--green); }
  .search-status.error { color: var(--red); }

  /* ── Content Area ── */
  .content-area { display: flex; flex-direction: column; }

  /* ── Tab nav ── */
  .content-nav { display: flex; align-items: stretch; flex-shrink: 0; border-bottom: 1px solid var(--border); background: rgba(15,22,41,0.95); position: sticky; top: 49px; z-index: 20; }
  .view-tab { font-family: var(--display); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 11px 18px; cursor: pointer; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--muted); transition: all 0.15s; white-space: nowrap; }
  .view-tab:hover:not(:disabled) { color: var(--text); }
  .view-tab.active { color: var(--amber); border-bottom-color: var(--amber); }
  .view-tab:disabled { opacity: 0.35; cursor: not-allowed; }
  .tab-pill { display: inline-block; background: var(--amber); color: #000; font-size: 9px; font-weight: 700; padding: 1px 5px; margin-left: 5px; border-radius: 2px; vertical-align: middle; }
  .nav-space { flex: 1; }
  .refresh-lbl { font-family: var(--mono); font-size: 10px; color: var(--muted); padding: 11px 16px; }

  /* ── View panels ── */
  .view-panel { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; min-height: 0; }

  /* ── Watch list ── */
  .watch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; }

  /* ── Watch cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); padding: 14px 16px; transition: border-color 0.2s; }
  .card:hover { border-color: var(--border2); }
  .card.status-ok    { border-left: 3px solid var(--green); }
  .card.status-error { border-left: 3px solid var(--red); }
  .card.status-      { border-left: 3px solid var(--muted); }
  .card.status-disabled { opacity: 0.45; }
  .card-airline { font-size: 11px; font-weight: 600; color: var(--amber); margin-bottom: 3px; }
  .card-route   { font-size: 15px; font-weight: 700; color: #e2e8f0; letter-spacing: 0.05em; margin-bottom: 3px; }
  .card-date    { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .card-prices  { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
  .card-price-now { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--green); }
  .card-price-now.above-target { color: var(--text); }
  .card-price-target { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .card-price-target .hit { color: var(--amber); }
  .card-meta    { display: flex; align-items: center; gap: 10px; }
  .card-status  { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .card-status.ok    { color: var(--green); }
  .card-status.error { color: var(--red); }
  .card-status.nf    { color: var(--muted); }
  .card-checked { font-family: var(--mono); font-size: 10px; color: var(--muted); flex: 1; }
  .card-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .badge      { font-size: 9px; font-weight: 700; padding: 2px 6px; letter-spacing: 0.1em; text-transform: uppercase; }
  .badge-drop  { background: rgba(16,185,129,0.15); color: var(--green); }
  .badge-range { background: rgba(245,158,11,0.1);  color: var(--amber); }
  .card-edit { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; margin-top: 0; border-top: none; }
  .card-edit.open { max-height: 400px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .card-edit .row2 { grid-template-columns: 1fr 1fr; gap: 8px; }
  .card-edit .btn-primary { margin: 8px 0 0; padding: 7px; font-size: 11px; }
  #histModal { display: none; position: fixed; inset: 0; background: rgba(5,8,15,0.75); z-index: 500; align-items: center; justify-content: center; padding: 16px; }
  #histModal.open { display: flex; }
  .hist-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 20px; width: min(92vw, 680px); max-height: 85vh; overflow-y: auto; }
  .hist-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .hist-title { font-size: 0.95rem; font-weight: 700; color: #e2e8f0; line-height: 1.3; flex: 1; }
  .hist-close { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: #94a3b8; cursor: pointer; padding: 4px 10px; font-size: 0.9rem; }
  .hist-close:hover { border-color: var(--amber); color: var(--amber); }
  .hist-stats { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .hist-stat { background: rgba(15,22,41,0.7); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; min-width: 90px; }
  .hist-stat .hs-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .hist-stat .hs-value { font-family: var(--mono); font-size: 14px; font-weight: 700; color: #e2e8f0; }
  .hist-stat .hs-value.up   { color: #f87171; }
  .hist-stat .hs-value.down { color: #4ade80; }
  .hist-chart-wrap { position: relative; height: 280px; }
  .hist-msg { color: #94a3b8; font-size: 0.8rem; padding: 4px 0; }

  /* ── Results hero ── */
  .results-hero { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .results-route-big { font-size: 28px; font-weight: 700; color: #e2e8f0; letter-spacing: 0.04em; line-height: 1.1; margin-bottom: 6px; }
  .results-sub { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .results-count-label { color: var(--text); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 10px; height: 10px; border: 2px solid var(--amber-dim); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  .searching-indicator { display: inline-flex; align-items: center; gap: 6px; color: var(--amber); }

  /* ── Date accordion ── */
  .date-section { margin-bottom: 6px; }
  .date-section-hdr { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); transition: border-color 0.15s; user-select: none; }
  .date-section-hdr:hover    { border-color: var(--border2); }
  .date-section-hdr.expanded { border-color: var(--border2); border-bottom-color: transparent; }
  .ds-date  { font-weight: 700; font-size: 13px; color: #e2e8f0; min-width: 100px; }
  .ds-cur   { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .ds-price { font-family: var(--mono); font-size: 14px; color: var(--green); font-weight: 700; }
  .ds-opts  { font-family: var(--mono); font-size: 10px; color: var(--muted); flex: 1; }
  .ds-chev  { color: var(--muted); font-size: 10px; margin-left: auto; transition: transform 0.2s; }
  .date-section-hdr.expanded .ds-chev { transform: rotate(180deg); }
  .date-section-body { border: 1px solid var(--border2); border-top: none; background: rgba(12,18,32,0.6); padding: 10px; display: none; }
  .date-section-body.open { display: block; }

  /* ── Flight table ── */
  @keyframes rowIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .flight-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .flight-table th { text-align: left; padding: 6px 10px; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  .flight-table .col-check  { width: 28px; padding-left: 4px; }
  .flight-table .col-airline{ min-width: 140px; }
  .flight-table .col-times  { min-width: 130px; }
  .flight-table .col-dur    { min-width: 90px; }
  .flight-table .col-stops  { min-width: 90px; }
  .flight-table .col-price  { min-width: 110px; text-align: right; padding-right: 6px; }
  .flight-row { border-bottom: 1px solid rgba(30,45,80,0.6); animation: rowIn 0.2s ease-out both; animation-delay: var(--delay,0ms); transition: background 0.1s; }
  .flight-row:hover   { background: rgba(245,158,11,0.04); }
  .flight-row.checked { background: rgba(245,158,11,0.08); }
  .flight-row.best    { border-left: 3px solid var(--green); }
  .flight-row td { padding: 10px; vertical-align: top; }
  .flight-row.best .price-val { color: var(--green); }
  .airline-name { font-weight: 600; color: #e2e8f0; margin-bottom: 2px; }
  .airline-fn   { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .times-depart { font-family: var(--mono); color: var(--text); margin-bottom: 2px; }
  .times-arrow  { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .stop-cities  { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
  .price-val    { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .price-badge  { font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(16,185,129,0.15); color: var(--green); display: inline-block; padding: 2px 6px; }
  .price-diff   { font-family: var(--mono); font-size: 11px; color: var(--amber); }
  .flt-cb       { accent-color: var(--amber); width: 14px; height: 14px; cursor: pointer; }

  /* ── Add bar ── */
  .add-bar { position: sticky; bottom: 0; background: var(--surface2); border-top: 1px solid var(--border2); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 5; margin: 0 -20px -20px; }
  .add-bar-count { font-family: var(--mono); font-size: 12px; color: var(--amber); flex: 1; }
  .add-bar-fields { display: flex; gap: 10px; align-items: center; }
  .add-bar-fields label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 5px; margin-bottom: 0; }
  .add-bar-fields input { width: 80px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 5px 8px; outline: none; }
  .add-bar-fields input:focus { border-color: var(--amber); }
  .add-bar .btn-primary { width: auto; margin-bottom: 0; padding: 7px 14px; font-size: 11px; }

  /* ── Empty state ── */
  .empty-state { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 13px; line-height: 1.8; }
  .empty-icon  { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }

  /* ── Airport autocomplete ── */
  .airport-dropdown { position:absolute; top:100%; left:0; z-index:50; background:var(--surface); border:1px solid var(--border2); min-width:260px; max-height:220px; overflow-y:auto; display:none; }
  .airport-option { display:flex; align-items:center; gap:8px; padding:7px 10px; cursor:pointer; }
  .airport-option:hover, .airport-option.ao-active { background:rgba(245,158,11,0.1); }
  .ao-code { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--amber); min-width:34px; }
  .ao-name { font-size:12px; color:var(--text); flex:1; }
  .ao-country { font-family:var(--mono); font-size:10px; color:var(--muted); }

  /* ── Round trip result card ── */
  .rt-card { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--amber); padding:12px 14px; margin-bottom:8px; animation:rowIn 0.2s ease-out both; animation-delay:var(--delay,0ms); }
  .rt-card.rt-selected { background:rgba(245,158,11,0.06); border-color:var(--border2); }
  .rt-header { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .rt-route { font-size:16px; font-weight:700; color:#e2e8f0; letter-spacing:0.04em; flex:1; }
  .rt-price { font-family:var(--mono); font-size:16px; font-weight:700; color:var(--text); }
  .rt-dates { font-family:var(--mono); font-size:11px; color:var(--muted); margin-left:26px; margin-bottom:3px; }
  .rt-breakdown { font-family:var(--mono); font-size:11px; color:var(--muted); margin-left:26px; }

  /* ── Round trip sequential search ── */
  .rt-search-section { margin-bottom:16px; }
  .rt-section-hdr { display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:13px; color:var(--amber); padding:8px 0 6px; border-bottom:1px solid var(--border); margin-bottom:6px; }
  .rt-section-date { color:var(--muted); font-weight:400; font-family:var(--mono); font-size:11px; }
  .rt-locked { opacity:0.4; pointer-events:none; }
  .rt-locked-msg { font-size:12px; color:var(--muted); padding:10px 0 6px; font-style:italic; }
  .rt-row { display:grid; grid-template-columns:1.4fr 1.2fr 1fr auto; align-items:center; gap:8px; padding:9px 12px; cursor:pointer; border:1px solid var(--border); margin-bottom:4px; transition:background 0.1s,border-color 0.1s; }
  .rt-row:hover { background:rgba(245,158,11,0.05); border-color:var(--border2); }
  .rt-row.rt-row-selected { background:rgba(245,158,11,0.10); border-color:var(--amber); }
  .rt-row-airline { font-size:12px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rt-row-times { font-family:var(--mono); font-size:12px; color:var(--text); }
  .rt-row-meta { font-size:11px; color:var(--muted); }
  .rt-row-price { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--text); text-align:right; white-space:nowrap; }
  .rt-price-note { font-family:var(--display); font-size:10px; font-weight:400; color:var(--amber); display:block; }
  .price-delta-down { color: #4ade80; font-size: 0.8rem; margin-left: 6px; }
  .price-delta-up   { color: #f87171; font-size: 0.8rem; margin-left: 6px; }

  .layout.remote-mode { grid-template-columns: 1fr; }
  #remoteBanner { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: rgba(245,158,11,0.08); border-left: 3px solid var(--amber); color: #cbd5e1; font-size: 0.8rem; }
  #remoteBanner button { margin-left: auto; background: transparent; border: none; color: #94a3b8; cursor: pointer; font-size: 0.9rem; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid var(--border2); color: #e2e8f0; padding: 10px 18px; border-radius: 999px; font-size: 0.85rem; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* ---- Mobile (<=768px) ---- */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .panel-title .panel-chevron { display: none; }
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .panel { border-right: none; border-bottom: 1px solid var(--border); padding: 14px 16px; }
    .panel-title { cursor: pointer; margin-bottom: 0; display: flex; align-items: center; justify-content: space-between; }
    .panel-title .panel-chevron { display: inline; font-size: 12px; }
    .panel.collapsed > *:not(.panel-title) { display: none; }
    .panel:not(.collapsed) .panel-title { margin-bottom: 14px; }
    .content-nav { flex-wrap: wrap; padding: 4px; }
    .refresh-lbl { display: none; }
    .card-actions .btn { padding: 10px 14px; }
    .field input, .field select { font-size: 16px; padding: 10px 12px; }
    .rt-flight-table { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .rt-row { min-width: 460px; }
  }
</style>
</head>
<body>
<div id="loginOverlay" style="display:none;position:fixed;inset:0;background:#0a0f1a;z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#111827;border:1px solid #1e293b;border-radius:12px;padding:32px;width:320px;max-width:90vw;">
    <h2 style="margin:0 0 24px;color:#e2e8f0;font-size:1.25rem;text-align:center;">Flight Monitor</h2>
    <input type="text" id="loginUsername" placeholder="Username"
      style="width:100%;box-sizing:border-box;padding:10px 12px;margin-bottom:12px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:0.9rem;"
      onkeydown="if(event.key==='Enter')document.getElementById('loginPassword').focus()">
    <input type="password" id="loginPassword" placeholder="Password"
      style="width:100%;box-sizing:border-box;padding:10px 12px;margin-bottom:8px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:0.9rem;"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div id="loginError" style="color:#f87171;font-size:0.8rem;min-height:1.2em;margin-bottom:8px;"></div>
    <button onclick="doLogin()"
      style="width:100%;padding:10px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-size:0.95rem;cursor:pointer;">
      Sign In
    </button>
  </div>
</div>
<div id="app" style="display:none">
<header>
  <div class="logo">&#9992; Flight<span>Monitor</span></div>
  <div class="header-sep"></div>
  <span class="status-dot"></span>
  <span class="status-label" id="hdrStatus">LIVE</span>
</header>

<div class="layout" id="layoutRoot">

  <!-- Search Panel -->
  <div class="panel" id="searchPanel">
    <div class="panel-title" id="panelTitle" onclick="togglePanelCollapse()">Search Flights <span class="panel-chevron" id="panelChevron">&#9662;</span></div>
    <div class="row2" style="align-items:flex-end">
      <div class="field"><label>From</label><input type="text" id="inFrom" value="SFO" style="text-transform:uppercase" autocomplete="off"></div>
      <button class="btn btn-ghost" id="btnSwap" style="padding:6px 8px;margin-bottom:2px" title="Swap airports">&#8644;</button>
      <div class="field"><label>To</label><input type="text" id="inTo" value="HKG" style="text-transform:uppercase" autocomplete="off"></div>
    </div>
    <div class="radio-row">
      <label><input type="radio" name="tripType" value="oneWay" checked> One-way</label>
      <label><input type="radio" name="tripType" value="range"> Date range</label>
      <label><input type="radio" name="tripType" value="roundTrip"> Round Trip</label>
    </div>
    <div id="singleDateRow" class="field"><label>Date</label><input type="date" id="inSingleDate"></div>
    <div id="rangeRow" style="display:none">
      <div class="row2">
        <div class="field"><label>From</label><input type="date" id="inDateFrom"></div>
        <div class="field"><label>To</label><input type="date" id="inDateTo"></div>
      </div>
    </div>
    <div id="roundTripRow" style="display:none">
      <div class="row2">
        <div class="field"><label>Depart</label><input type="date" id="inDepart"></div>
        <div class="field"><label>Return</label><input type="date" id="inReturn"></div>
      </div>
    </div>
    <button class="btn btn-primary" id="btnSearch">SEARCH FLIGHTS</button>
    <div class="search-status" id="searchStatus"></div>
  </div>

  <!-- Content Area -->
  <div class="content-area">
    <div class="content-nav">
      <button id="tabWatches" class="view-tab active" onclick="switchTab('watches')">&#9776; Watch List</button>
      <button id="tabResults" class="view-tab" disabled onclick="switchTab('results')">
        &#9992; Flight Results <span id="resultsPill" class="tab-pill" style="display:none">0</span>
      </button>
      <button id="tabMiles" class="view-tab" onclick="switchTab('miles')">&#9733; Miles</button>
      <div class="nav-space"></div>
      <span class="refresh-lbl" id="refreshTime"></span>
      <button class="btn btn-ghost" id="btnAddWatch" style="margin-left:8px">+ Add Watch</button>
      <button class="btn btn-ghost" id="btnRefreshNow" style="margin-left:8px">Refresh Now</button>
      <button class="btn btn-ghost" id="btnTestEmail" style="margin-left:8px">Test Email</button>
      <button onclick="doLogout()" style="margin-left:8px;background:transparent;border:1px solid #334155;border-radius:6px;color:#94a3b8;padding:4px 10px;cursor:pointer;font-size:0.8rem;">Logout</button>
    </div>

    <!-- Watch List View -->
    <div id="watchView" class="view-panel">
      <div id="addWatchForm" style="display:none;padding:14px;margin:12px;border:1px solid var(--border);border-radius:10px;background:rgba(15,22,41,0.7);max-width:680px;">
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <div class="field"><label>From</label><input id="awOrigin" placeholder="SFO" style="text-transform:uppercase"></div>
          <div class="field"><label>To</label><input id="awDest" placeholder="HKG" style="text-transform:uppercase"></div>
          <div class="field"><label>Trip</label><select id="awTrip"><option value="oneWay">One-way</option><option value="roundTrip">Round trip</option></select></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">
          <div class="field"><label>Departure</label><input type="date" id="awDate"></div>
          <div class="field" id="awReturnWrap" style="display:none"><label>Return</label><input type="date" id="awReturn"></div>
          <div class="field"><label>Airline (optional)</label><input id="awAirline" placeholder="Any"></div>
          <div class="field"><label>Target price (optional)</label><input type="number" id="awTarget" step="0.01"></div>
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center;">
          <button class="btn btn-primary" id="awSubmit">ADD WATCH</button>
          <span id="awError" style="color:#f87171;font-size:0.8rem;"></span>
        </div>
      </div>
      <div class="watch-grid" id="watchCards">
        <div class="empty-state"><div class="empty-icon">&#9992;</div>No watches yet.<br>Search for a flight and add it to your list.</div>
      </div>
    </div>

    <!-- Flight Results View -->
    <div id="resultsView" class="view-panel" style="display:none">
      <div id="resultsHero" class="results-hero" style="display:none">
        <div class="results-route-big" id="resultsRoute"></div>
        <div class="results-sub">
          <span id="resultsDateLbl"></span>
          <span id="resultsStatusLbl"></span>
        </div>
      </div>
      <div id="resultsContent" style="flex:1"></div>
      <!-- Sticky add bar -->
      <div id="addBar" class="add-bar" style="display:none">
        <span id="addCount" class="add-bar-count"></span>
        <div class="add-bar-fields">
          <label>Target <input type="number" id="addTarget" placeholder="opt." step="0.01"></label>
        </div>
        <button class="btn btn-primary" id="btnAddSelected">ADD TO WATCH LIST</button>
      </div>
    </div>

    <!-- Miles (United award) View -->
    <div id="milesView" class="view-panel" style="display:none">
      <div style="padding:12px 12px 0;">
        <button class="btn btn-ghost" id="btnAddMilesWatch">+ Add Miles Watch</button>
      </div>
      <div id="addMilesForm" style="display:none;padding:14px;margin:12px;border:1px solid var(--border);border-radius:10px;background:rgba(15,22,41,0.7);max-width:680px;">
        <div style="font-size:0.8rem;color:#94a3b8;margin-bottom:8px;">United award (economy) &mdash; price tracked in MileagePlus miles</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <div class="field"><label>From</label><input id="mwOrigin" placeholder="SFO" style="text-transform:uppercase"></div>
          <div class="field"><label>To</label><input id="mwDest" placeholder="HKG" style="text-transform:uppercase"></div>
          <div class="field"><label>Trip</label><select id="mwTrip"><option value="oneWay">One-way</option><option value="roundTrip">Round trip</option></select></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">
          <div class="field"><label>Departure</label><input type="date" id="mwDate"></div>
          <div class="field" id="mwReturnWrap" style="display:none"><label>Return</label><input type="date" id="mwReturn"></div>
          <div class="field"><label>Target miles (optional)</label><input type="number" id="mwTarget" step="1000" min="0"></div>
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center;">
          <button class="btn btn-primary" id="mwSubmit">ADD MILES WATCH</button>
          <span id="mwError" style="color:#f87171;font-size:0.8rem;"></span>
        </div>
      </div>
      <div class="watch-grid" id="milesCards">
        <div class="empty-state"><div class="empty-icon">&#9733;</div>No miles watches yet.<br>Add a United award watch to track it.</div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Price History Dialog -->
<div id="histModal" onclick="if(event.target===this)closeHistory()">
  <div class="hist-box">
    <div class="hist-head">
      <div class="hist-title" id="histTitle"></div>
      <button class="hist-close" onclick="closeHistory()" title="Close">&#10005;</button>
    </div>
    <div class="hist-stats" id="histStats"></div>
    <div class="hist-chart-wrap"><canvas id="histCanvas"></canvas></div>
    <div class="hist-msg" id="histMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
const LOCAL_API  = 'http://localhost:5678';
const REMOTE_API = 'https://provoking-spearman-tux.ngrok-free.dev';
let API = LOCAL_API;
const CHECK_INTERVAL_MIN = 30;   // must match the monitor loop wait in server.ps1 (1800000 ms)

// Returns fetch headers for API calls — adds ngrok bypass when using the tunnel
function apiHeaders(extra) {
    const h = Object.assign({ 'Content-Type': 'application/json' }, extra || {});
    if (API === REMOTE_API) h['ngrok-skip-browser-warning'] = '1';
    return h;
}

const SUPABASE_URL = 'https://fgimfhpdbrthkcarxwhe.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KVuJpRGZOYE7T5oZ0Y-3TA_2hHQ7_MM';
const SB = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };

async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function newWatchId() {
    return crypto.randomUUID().replace(/-/g,'').substring(0,8);
}

function buildWatchLabel(origin, destination, tripType, departureDate, returnDate, airline, flightNumber, dateMode, dateFrom, dateTo) {
    const airlinePrefix = airline ? `${flightNumber ? flightNumber + ' | ' : ''}${airline} | ` : '';
    if (tripType === 'roundTrip') return `${airlinePrefix}${origin} <-> ${destination} | ${departureDate} / ${returnDate}`;
    if (dateMode === 'range') return `${airlinePrefix}${origin} -> ${destination} | ${dateFrom} to ${dateTo}`;
    return `${airlinePrefix}${origin} -> ${destination} | ${departureDate}`;
}

let currentUser = null;
const SESSION_KEY = 'flightMonitorUser';

function showLoginOverlay() {
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    setTimeout(() => document.getElementById('loginUsername').focus(), 50);
}

function showApp() {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').style.display = '';
}

async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    if (!username || !password) { errEl.textContent = 'Enter username and password.'; return; }
    const hash = await sha256(password);
    try {
        const r = await fetch(
            `${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(username)}&password_hash=eq.${hash}&select=id,username`,
            { headers: SB }
        );
        const rows = r.ok ? await r.json() : [];
        if (rows.length === 0) {
            errEl.textContent = 'Incorrect username or password.';
            document.getElementById('loginPassword').value = '';
            return;
        }
        currentUser = { id: rows[0].id, username: rows[0].username };
        localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
        showApp();
        loadWatches();
        checkLocalServer();
    } catch(e) {
        errEl.textContent = 'Login error — check network.';
    }
}

function doLogout() {
    currentUser = null;
    localStorage.removeItem(SESSION_KEY);
    showLoginOverlay();
}

let localServerAvailable = false;

async function checkLocalServer() {
    // Try local first
    try {
        await fetch(`${LOCAL_API}/`, { mode: 'no-cors', signal: AbortSignal.timeout(1500) });
        API = LOCAL_API;
        localServerAvailable = true;
        return;
    } catch {}
    // Fall back to ngrok tunnel
    try {
        await fetch(`${REMOTE_API}/`, { mode: 'no-cors', signal: AbortSignal.timeout(4000) });
        API = REMOTE_API;
        localServerAvailable = true;
        return;
    } catch {}
    // Neither available
    localServerAvailable = false;
    const searchPanel = document.getElementById('searchPanel');
    if (searchPanel) searchPanel.style.display = 'none';
    const layoutRoot = document.getElementById('layoutRoot');
    if (layoutRoot) layoutRoot.classList.add('remote-mode');
    const nav = document.querySelector('.content-nav');
    if (nav && !document.getElementById('remoteBanner')) {
        const b = document.createElement('div');
        b.id = 'remoteBanner';
        b.innerHTML = 'Search requires your home machine - watches update automatically. <button onclick="document.getElementById(\'remoteBanner\').remove()" title="Dismiss">&#10005;</button>';
        nav.parentElement.insertBefore(b, nav);
    }
    const btnRefresh = document.getElementById('btnRefreshNow');
    if (btnRefresh) { btnRefresh.disabled = true; btnRefresh.title = 'Requires local server'; }
    const btnEmail = document.getElementById('btnTestEmail');
    if (btnEmail) { btnEmail.disabled = true; btnEmail.title = 'Requires local server'; }
}

function buildFlightUrl(w) {
    const base = 'https://www.google.com/travel/flights?q=';
    if (w.tripType === 'roundTrip') {
        return base + 'round+trip+flights+from+' + w.origin + '+to+' + w.destination
             + '+on+' + w.departureDate + '+returning+' + w.returnDate;
    }
    const date = w.departureDate;
    return base + 'one+way+flights+from+' + w.origin + '+to+' + w.destination + '+on+' + date;
}
function buildUnitedAwardUrl(w) {
    const base = 'https://www.united.com/en/us/fsr/choose-flights?';
    const tail = '&at=1&sc=7&px=1&taxng=1&newHP=True&clm=7&st=bestmatches&tqp=A';
    if (w.tripType === 'roundTrip') {
        return base + 'f=' + w.origin + '&t=' + w.destination + '&d=' + w.departureDate + '&r=' + w.returnDate + '&tt=2' + tail;
    }
    return base + 'f=' + w.origin + '&t=' + w.destination + '&d=' + w.departureDate + '&tt=1' + tail;
}
function buildWatchUrl(w) {
    return w.pricing === 'miles' ? buildUnitedAwardUrl(w) : buildFlightUrl(w);
}
function fmtWatchPrice(cur, n) {
    const v = parseFloat(n);
    if (cur === 'MILES') return Math.round(v).toLocaleString('en-US') + ' miles';
    return cur + ' ' + v.toFixed(2);
}
function showToast(msg) {
    if (!document.body) return;
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
}
function toIsoDate(d) {
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
(function setDefaultDates() {
    const plus = days => { const d = new Date(); d.setDate(d.getDate() + days); return toIsoDate(d); };
    const d14 = plus(14), d21 = plus(21);
    [['inSingleDate', d14], ['inDateFrom', d14], ['inDateTo', d21], ['inDepart', d14], ['inReturn', d21], ['awDate', d14], ['awReturn', d21], ['mwDate', d14], ['mwReturn', d21]].forEach(([id, v]) => {
        const el = document.getElementById(id);
        if (el && !el.value) el.value = v;
    });
})();
let selectedFlights    = [];
let currentSearch      = null;
let searchPoll         = null;
let accumulatedResults = [];
let rtSelectedOutbound = null;   // { flight: {...} } when user picks outbound row
let rtSelectedReturn   = null;   // { flight: {...} } when user picks return row
let rtBundledGen = 0;

const pad  = n => String(n).padStart(2,'0');
const fmt  = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fmtD = s => { if (!s) return ''; const p = s.split('-'); return `${p[2]} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+p[1]-1]} ${p[0]}`; };
const fmtN = n => Number(n).toLocaleString('en-US', {minimumFractionDigits:0,maximumFractionDigits:0});

document.querySelectorAll('[name=tripType]').forEach(r => r.addEventListener('change', () => {
    const v = document.querySelector('[name=tripType]:checked').value;
    document.getElementById('singleDateRow').style.display = v==='oneWay'    ? '' : 'none';
    document.getElementById('rangeRow').style.display      = v==='range'     ? '' : 'none';
    document.getElementById('roundTripRow').style.display  = v==='roundTrip' ? '' : 'none';
}));

function switchTab(w) {
    const views = { watches: 'watchView', results: 'resultsView', miles: 'milesView' };
    for (const k in views) {
        document.getElementById(views[k]).style.display = (k === w) ? '' : 'none';
    }
    document.getElementById('tabWatches').classList.toggle('active', w === 'watches');
    document.getElementById('tabResults').classList.toggle('active', w === 'results');
    document.getElementById('tabMiles').classList.toggle('active', w === 'miles');
}

function updateAddBar() {
    const n = selectedFlights.length;
    const bar = document.getElementById('addBar');
    if (n === 0) { bar.style.display='none'; return; }
    bar.style.display='';
    const rt = n === 1 && selectedFlights[0]._isRoundTrip;
    if (rt && rtSelectedOutbound && rtSelectedReturn) {
        const cur   = selectedFlights[0].currency || 'USD';
        const total = selectedFlights[0].price;
        document.getElementById('addCount').textContent =
            'Round trip selected — ' + cur + ' ' + fmtN(total);
    } else {
        document.getElementById('addCount').textContent =
            n + ' flight' + (n===1?'':'s') + ' selected';
    }
}

document.getElementById('btnSearch').addEventListener('click', async () => {
    const origin = document.getElementById('inFrom').value.toUpperCase().trim();
    const dest   = document.getElementById('inTo').value.toUpperCase().trim();
    if (!origin||!dest) { alert('Enter airport codes.'); return; }
    const tripType = document.querySelector('[name=tripType]:checked').value;
    let dateFrom,dateTo,returnDate;
    if (tripType==='range') {
        dateFrom=document.getElementById('inDateFrom').value; dateTo=document.getElementById('inDateTo').value; returnDate=null;
    } else if (tripType==='roundTrip') {
        dateFrom=dateTo=document.getElementById('inDepart').value; returnDate=document.getElementById('inReturn').value;
        if (!returnDate) { alert('Select a return date.'); return; }
    } else {
        dateFrom=dateTo=document.getElementById('inSingleDate').value; returnDate=null;
    }
    if (!dateFrom||!dateTo) { alert('Select date(s).'); return; }
    currentSearch={origin,dest,tripType,dateFrom,dateTo,returnDate};
    accumulatedResults=[]; selectedFlights=[]; rtSelectedOutbound=null; rtSelectedReturn=null; updateAddBar();
    const btn=document.getElementById('btnSearch');
    btn.disabled=true; btn.textContent='SEARCHING...';
    setStatus('searching','Searching...');
    const arrow=tripType==='roundTrip'?' &#8644; ':' &#8594; ';
    document.getElementById('resultsRoute').innerHTML=`${origin}${arrow}${dest}`;
    let dLabel='';
    if (tripType==='range') dLabel=`${fmtD(dateFrom)} &ndash; ${fmtD(dateTo)}`;
    else if (tripType==='roundTrip') dLabel=`${fmtD(dateFrom)} / ${fmtD(returnDate)}`;
    else dLabel=fmtD(dateFrom);
    document.getElementById('resultsDateLbl').innerHTML=dLabel;
    document.getElementById('resultsStatusLbl').innerHTML='<span class="searching-indicator"><span class="spinner"></span> Searching...</span>';
    document.getElementById('resultsHero').style.display='';
    document.getElementById('resultsContent').innerHTML='';
    updatePill(0);
    document.getElementById('tabResults').disabled=false;
    switchTab('results');
    if (searchPoll) { clearInterval(searchPoll); searchPoll=null; }
    try {
        const body={origin,destination:dest,dateFrom,dateTo};
        if (tripType==='roundTrip') { body.tripType='roundTrip'; body.returnDate=returnDate; }
        const res=await fetch(`${API}/api/search`,{method:'POST',headers:apiHeaders(),body:JSON.stringify(body)});
        const d=await res.json();
        if (!res.ok || !d.jobId) throw new Error(d.error || ('HTTP ' + res.status));
        const jobId=d.jobId;
        const useAccordion=tripType==='range';
        let lastCount=0;
        searchPoll=setInterval(async ()=>{
            try {
                const s=await fetch(`${API}/api/search/status?jobId=${jobId}`,{headers:apiHeaders()}).then(r=>r.json());
                if (s.results&&s.results.length>lastCount) {
                    for (let i=lastCount;i<s.results.length;i++) { accumulatedResults.push(s.results[i]); appendResult(s.results[i],useAccordion,i); }
                    lastCount=s.results.length; updatePill(lastCount);
                }
                if (s.status==='done'||s.status==='error') {
                    clearInterval(searchPoll); searchPoll=null;
                    btn.disabled=false; btn.textContent='SEARCH FLIGHTS';
                    if (s.status==='error') { setStatus('error','Search failed'); document.getElementById('resultsStatusLbl').innerHTML=`<span style="color:var(--red)">Error: ${s.error||'unknown'}</span>`; }
                    else { setStatus('done',`Found ${lastCount} result${lastCount===1?'':'s'}`); document.getElementById('resultsStatusLbl').innerHTML=`<span class="results-count-label">${lastCount} result${lastCount===1?'':'s'}</span>`; }
                    if (lastCount===0) document.getElementById('resultsContent').innerHTML='<div class="empty-state"><div class="empty-icon">&#128269;</div>No flights found.</div>';
                }
            } catch(e) { clearInterval(searchPoll); searchPoll=null; btn.disabled=false; btn.textContent='SEARCH FLIGHTS'; }
        },2000);
    } catch(e) { btn.disabled=false; btn.textContent='SEARCH FLIGHTS'; setStatus('error','Failed: '+e.message); }
});

function setStatus(cls,msg) { const el=document.getElementById('searchStatus'); el.className='search-status '+cls; el.textContent=msg; }
function updatePill(n) { const p=document.getElementById('resultsPill'); p.textContent=n; p.style.display=n>0?'':'none'; }

function buildFlightTable(container, flights, dateInfo) {
    if (!flights||flights.length===0) return;
    const prices=flights.map(f=>f.price).filter(p=>p!=null);
    if (prices.length===0) return;
    const minP=Math.min(...prices);
    const cur=(flights[0]&&flights[0].currency)?flights[0].currency:'USD';
    const table=document.createElement('table');
    table.className='flight-table';
    table.innerHTML=`<thead><tr>
      <th class="col-check"></th><th class="col-airline">Airline</th>
      <th class="col-times">Times</th><th class="col-dur">Duration</th>
      <th class="col-stops">Stops</th><th class="col-price">Price</th>
    </tr></thead><tbody></tbody>`;
    const scroll=document.createElement('div');
    scroll.className='table-scroll';
    scroll.appendChild(table);
    container.appendChild(scroll);
    const tbody=table.querySelector('tbody');
    flights.forEach((f,i)=>{
        const isBest=f.price===minP;
        const diff=f.price-minP;
        const stopLabel=f.stops===0?'Nonstop':(f.stops===1?'1 stop':(f.stops||'?')+' stops');
        const citiesHtml=(f.stopCities&&f.stopCities.length>0)?`<div class="stop-cities">via ${f.stopCities.join(', ')}</div>`:'';
        const tr=document.createElement('tr');
        tr.className='flight-row'+(isBest?' best':'');
        tr.style.setProperty('--delay',(i*40)+'ms');
        tr.innerHTML=`
          <td class="col-check"><input type="checkbox" class="flt-cb"></td>
          <td class="col-airline"><div class="airline-name">${f.airline||'--'}</div>${f.flightNumber?`<div class="airline-fn">${f.flightNumber}</div>`:''}</td>
          <td class="col-times">${f.departure?`<div class="times-depart">${f.departure}</div>`:''}${f.arrival?`<div class="times-arrow">-&gt; ${f.arrival}</div>`:''}</td>
          <td class="col-dur">${f.duration||'--'}</td>
          <td class="col-stops"><div>${stopLabel}</div>${citiesHtml}</td>
          <td class="col-price"><div class="price-val">${cur} ${fmtN(f.price)}</div>${isBest?'<div class="price-badge">CHEAPEST</div>':`<div class="price-diff">+${fmtN(diff)}</div>`}</td>`;
        tr.querySelector('.flt-cb').addEventListener('change',e=>{
            if (e.target.checked) {
                tr.classList.add('checked');
                selectedFlights.push({date:dateInfo.date||'',returnDate:dateInfo.returnDate||null,airline:f.airline||'',flightNumber:f.flightNumber||'',departureTime:f.departure||'',price:f.price,currency:cur});
            } else {
                tr.classList.remove('checked');
                selectedFlights=selectedFlights.filter(s=>!(s.date===(dateInfo.date||'')&&s.airline===(f.airline||'')&&s.price===f.price));
            }
            updateAddBar();
        });
        tbody.appendChild(tr);
    });
}

function renderRoundTripCard(container, result, idx) {

    const cur = result.currency || 'USD';

    if (!grid) { grid = document.createElement('div'); grid.id = 'mainGrid'; container.appendChild(grid); }
    const div = document.createElement('div');
    div.className = 'rt-card';
    div.style.setProperty('--delay', (idx * 40) + 'ms');
    const outStr = result.outboundPrice != null ? `${cs.origin}&rarr;${cs.dest}: ${cur} ${fmtN(result.outboundPrice)}` : '';
    const retStr = result.returnPrice  != null ? `${cs.dest}&rarr;${cs.origin}: ${cur} ${fmtN(result.returnPrice)}`  : '';
    div.innerHTML = `
        <div class="rt-header">
            <input type="checkbox" class="flt-cb rt-cb">
            <span class="rt-route">${cs.origin} &#8644; ${cs.dest}</span>
            <span class="rt-price">${cur} ${fmtN(result.price)}</span>
        </div>
        <div class="rt-dates">${fmtD(result.date)} &rarr; ${fmtD(result.returnDate)}</div>
        ${outStr||retStr ? `<div class="rt-breakdown">${[outStr,retStr].filter(Boolean).join(' &middot; ')}</div>` : ''}`;
    div.querySelector('.rt-cb').addEventListener('change', e => {
        if (e.target.checked) {
            div.classList.add('rt-selected');
            selectedFlights.push({ date:result.date, returnDate:result.returnDate||null, airline:'', flightNumber:'', departureTime:'', price:result.price, currency:cur });
        } else {

            selectedFlights = selectedFlights.filter(s => !(s.date===result.date && s.returnDate===(result.returnDate||null) && s.price===result.price));

}

function renderRoundTripSearch(container, result) {
    var cs  = currentSearch;
    var cur = result.currency || 'USD';

    var old = document.getElementById('rtSearchWrap');
    if (old) old.remove();
    var wrap = document.createElement('div');
    wrap.id = 'rtSearchWrap';
    container.appendChild(wrap);

    // --- Outbound section ---
    var outSec = document.createElement('div');
    outSec.className = 'rt-search-section';
    outSec.innerHTML =
        '<div class="rt-section-hdr">' +
            '<span>' + cs.origin + ' → ' + cs.dest + '</span>' +
            '<span class="rt-section-date">' + fmtD(result.date) + '</span>' +
        '</div>' +
        '<div class="rt-flight-table" id="rtOutboundTable"></div>';
    wrap.appendChild(outSec);

    // --- Return section (locked until outbound picked) ---
    var retSec = document.createElement('div');
    retSec.className = 'rt-search-section rt-locked';
    retSec.id = 'rtReturnSection';
    retSec.innerHTML =
        '<div class="rt-section-hdr">' +
            '<span>' + cs.dest + ' → ' + cs.origin + '</span>' +
            '<span class="rt-section-date">' + fmtD(result.returnDate) + '</span>' +
        '</div>' +
        '<div class="rt-locked-msg" id="rtReturnMsg">Select an outbound flight above to continue</div>' +
        '<div id="rtReturnTable" style="display:none"></div>';
    wrap.appendChild(retSec);

    // Build outbound rows
    var outTable = document.getElementById('rtOutboundTable');
    (result.outboundFlights || []).forEach(function(f) {
        var row = document.createElement('div');
        row.className = 'rt-row';
        var stopsLabel = f.stops === 0 ? 'Nonstop' : f.stops + ' stop' + (f.stops > 1 ? 's' : '');
        var airlineStr = [f.airline, f.flightNumber].filter(Boolean).join(' ');
        row.innerHTML =
            '<div class="rt-row-airline">' + (airlineStr || '—') + '</div>' +
            '<div class="rt-row-times">' + (f.departure || '—') + ' → ' + (f.arrival || '—') + '</div>' +
            '<div class="rt-row-meta">' + (f.duration || '') + ' · ' + stopsLabel + '</div>' +
            '<div class="rt-row-price">' + cur + ' ' + fmtN(f.price) +
                '<span class="rt-price-note">round trip</span></div>';
        row.addEventListener('click', function() {
            outTable.querySelectorAll('.rt-row').forEach(function(r) { r.classList.remove('rt-row-selected'); });
            row.classList.add('rt-row-selected');
            rtSelectedOutbound = { flight: f };
            rtSelectedReturn   = null;
            selectedFlights    = selectedFlights.filter(function(s) { return !s._isRoundTrip; });
            updateAddBar();
            fetchBundledReturns(f, result, cur);
        });
        outTable.appendChild(row);
    });

    function fetchBundledReturns(outFlight, result, cur) {
        const myGen = ++rtBundledGen;
        var retMsg   = document.getElementById('rtReturnMsg');
        var retTable = document.getElementById('rtReturnTable');
        var retSec   = document.getElementById('rtReturnSection');
        retSec.classList.remove('rt-locked');
        retMsg.textContent   = 'Loading included return flights…';
        retMsg.style.display = '';
        retTable.style.display = 'none';
        retTable.innerHTML   = '';
        document.getElementById('rtOutboundTable').classList.add('rt-locked');

        fetch(API + '/api/search/bundled-returns', {
            method:  'POST',
            headers: apiHeaders(),
            body: JSON.stringify({
                origin:            cs.origin,
                destination:       cs.dest,
                departDate:        result.date,
                returnDate:        result.returnDate,
                outboundAirline:   outFlight.airline,
                outboundDeparture: outFlight.departure,
                outboundRtPrice:   outFlight.price
            })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (!data.jobId) { throw new Error('No jobId returned'); }
            pollBundledReturns(data.jobId, outFlight, result, cur, myGen);
        })
        .catch(function(e) {
            var msg = document.getElementById('rtReturnMsg');
            if (msg) { msg.textContent = 'Error: ' + e.message; }
            const tbl = document.getElementById('rtOutboundTable');
            if (tbl) tbl.classList.remove('rt-locked');
        });
    }

    function pollBundledReturns(jobId, outFlight, result, cur, myGen) {
        var retMsg = document.getElementById('rtReturnMsg');
        if (!retMsg) { return; }  // user navigated away or re-searched

        fetch(API + '/api/search/status?jobId=' + jobId, { headers: apiHeaders() })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (myGen !== rtBundledGen) return;
            var msg = document.getElementById('rtReturnMsg');
            if (!msg) { return; }
            if (data.status === 'running') {
                setTimeout(function() { pollBundledReturns(jobId, outFlight, result, cur, myGen); }, 3000);
                return;
            }
            if (data.status === 'error') {
                msg.textContent = 'Could not load return flights. Try selecting a different outbound.';
                return;
            }
            var bundled = (data.results && data.results[0] && data.results[0].bundledReturns) || [];
            renderBundledReturns(bundled, outFlight, result, cur, myGen);
        })
        .catch(function(e) {
            var msg = document.getElementById('rtReturnMsg');
            if (msg) { msg.textContent = 'Error polling: ' + e.message; }
            var tbl = document.getElementById('rtOutboundTable');
            if (tbl) { tbl.classList.remove('rt-locked'); }
        });
    }

    function renderBundledReturns(bundled, outFlight, result, cur, myGen) {
        var retMsg   = document.getElementById('rtReturnMsg');
        var retTable = document.getElementById('rtReturnTable');
        if (!retMsg) { return; }
        if (myGen !== rtBundledGen) return;
        const outTbl = document.getElementById('rtOutboundTable');
        if (outTbl) outTbl.classList.remove('rt-locked');

        if (bundled.length === 0) {
            retMsg.textContent = 'No bundled returns found — try selecting a different outbound.';
            return;
        }

        retMsg.style.display   = 'none';
        retTable.style.display = '';

        bundled.forEach(function(f) {
            var row = document.createElement('div');
            row.className = 'rt-row';
            var stopsLabel = f.stops === 0 ? 'Nonstop' : f.stops + ' stop' + (f.stops > 1 ? 's' : '');
            var airlineStr = [f.airline, f.flightNumber].filter(Boolean).join(' ');
            row.innerHTML =
                '<div class="rt-row-airline">' + (airlineStr || '—') + '</div>' +
                '<div class="rt-row-times">' + (f.departure || '—') + ' → ' + (f.arrival || '—') + '</div>' +
                '<div class="rt-row-meta">' + (f.duration || '') + ' · ' + stopsLabel + '</div>' +
                '<div class="rt-row-price">—</div>';

            if (bundled.length === 1) {
                // Single bundled return: auto-select immediately
                row.classList.add('rt-row-selected');
                rtSelectedReturn = { flight: f };
                selectedFlights  = selectedFlights.filter(function(s) { return !s._isRoundTrip; });
                selectedFlights.push({
                    _isRoundTrip:        true,
                    date:                result.date,
                    returnDate:          result.returnDate,
                    airline:             outFlight.airline,
                    flightNumber:        outFlight.flightNumber,
                    departureTime:       outFlight.departure,
                    returnAirline:       f.airline,
                    returnFlightNumber:  f.flightNumber,
                    returnDepartureTime: f.departure,
                    price:               outFlight.price,
                    currency:            cur
                });
                updateAddBar();
            } else {
                row.addEventListener('click', function() {
                    retTable.querySelectorAll('.rt-row').forEach(function(r) { r.classList.remove('rt-row-selected'); });
                    row.classList.add('rt-row-selected');
                    rtSelectedReturn = { flight: f };
                    selectedFlights  = selectedFlights.filter(function(s) { return !s._isRoundTrip; });
                    selectedFlights.push({
                        _isRoundTrip:        true,
                        date:                result.date,
                        returnDate:          result.returnDate,
                        airline:             outFlight.airline,
                        flightNumber:        outFlight.flightNumber,
                        departureTime:       outFlight.departure,
                        returnAirline:       f.airline,
                        returnFlightNumber:  f.flightNumber,
                        returnDepartureTime: f.departure,
                        price:               outFlight.price,
                        currency:            cur
                    });
                    updateAddBar();
                });
            }
            retTable.appendChild(row);
        });
    }
}

function appendResult(result, useAccordion, idx) {
    const container=document.getElementById('resultsContent');
    if (result.outboundFlights) { renderRoundTripSearch(container, result); return; }
    const flights=result.flights&&result.flights.length>0?result.flights:null;
    if (!flights) { if (result.price != null) renderRoundTripCard(container, result, idx); return; }
    const dateInfo={date:result.date,returnDate:result.returnDate||null};
    const cur=(flights[0]&&flights[0].currency)?flights[0].currency:(result.currency||'USD');
    const minP=Math.min(...flights.map(f=>f.price).filter(p=>p!=null));
    if (useAccordion) {
        const sec=document.createElement('div'); sec.className='date-section';

        sec.innerHTML=`<div class="date-section-hdr" onclick="toggleDate(this)"><span class="ds-date">${fmtD(result.date)}</span><span class="ds-cur">${cur}</span><span class="ds-price">${fmtN(minP)}</span><span class="ds-opts">${flights.length} fare${flights.length===1?'':'s'}</span><span class="ds-chev">&#9650;</span></div><div class="date-section-body" id="${bId}"></div>`;

let priceDeltas = {};   // watchId -> signed change since previous check

function createWatch(watch) {
    return fetch(`${SUPABASE_URL}/rest/v1/watches`, {
        method: 'POST',
        headers: { ...SB, Prefer: 'return=minimal' },
        body: JSON.stringify(watch)
    }).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r; });
}

async function loadWatches() {
    if (!currentUser) return;
    try {
        const [w, logs] = await Promise.all([
            fetch(`${SUPABASE_URL}/rest/v1/watches?order=addedAt.asc`, { headers: SB }).then(r => r.json()),
            fetch(`${SUPABASE_URL}/rest/v1/price_log?order=checked_at.desc&limit=200`, { headers: SB }).then(r => r.json()).catch(() => [])
        ]);
        priceDeltas = {};
        if (Array.isArray(logs)) {
            const byWatch = {};
            logs.forEach(r => { (byWatch[r.watch_id] = byWatch[r.watch_id] || []).push(parseFloat(r.price)); });
            for (const wid in byWatch) {
                const p = byWatch[wid];   // newest first
                if (p.length >= 2 && p[0] !== p[1]) priceDeltas[wid] = p[0] - p[1];
            }
        }
        renderWatches(Array.isArray(w) ? w : [w]);
        document.getElementById('refreshTime').textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch(e) {
        document.getElementById('watchCards').innerHTML = '<div class="empty-state"><div class="empty-icon">&#9888;</div>Cannot connect.</div>';
    }
}

function renderWatches(all) {
    watchesById = {};
    (all || []).forEach(w => { if (w && w.id) watchesById[w.id] = w; });
    const cash  = (all || []).filter(w => w.pricing !== 'miles');
    const miles = (all || []).filter(w => w.pricing === 'miles');
    renderGrid(cash, 'watchCards', '&#9992;', 'No watches yet.<br>Search for a flight and add it to your list.');
    renderGrid(miles, 'milesCards', '&#9733;', 'No miles watches yet.<br>Add a United award watch to track it.');
}

function renderGrid(list, elId, icon, emptyMsg) {
    const el = document.getElementById(elId);
    if (!list || list.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">' + icon + '</div>' + emptyMsg + '</div>';
        return;
    }
    el.innerHTML = '';
    list.forEach(w => el.appendChild(buildCard(w)));
}

function buildCard(w) {
    const isRound=w.tripType==='roundTrip';
    const wCur=w.currency||'USD';
    const timeStr=w.departureTime?' · '+w.departureTime:'';
    const dateStr=w.dateMode==='range'?`${w.dateFrom} to ${w.dateTo}`:isRound?`${w.departureDate} -> ${w.returnDate}`:`${w.departureDate}${timeStr}`;
    const priceStr=w.lastPrice!=null?fmtWatchPrice(wCur, w.lastPrice):'--';
    const delta = priceDeltas[w.id];
    const deltaHtml = delta != null
        ? `<span class="price-delta-${delta < 0 ? 'down' : 'up'}">${delta < 0 ? '&#9660;' : '&#9650;'} ${fmtWatchPrice(wCur, Math.abs(delta))}</span>`
        : '';
    const isAbove=w.targetPrice!=null&&w.lastPrice!=null&&parseFloat(w.lastPrice)>parseFloat(w.targetPrice);
    const targetStr=w.targetPrice!=null?`target <span class="${!isAbove?'hit':''}">${fmtWatchPrice(wCur, w.targetPrice)}</span>`:'no target';
    let sc='ok',sl='OK';
    if (!w.enabled){sc='';sl='DISABLED';} else if(w.status==='ERROR'){sc='error';sl='ERROR';} else if(w.status==='NOT_FOUND'){sc='nf';sl='NOT FOUND';}
    const lBadge=(w.lowestSeen!=null&&w.lastPrice!=null&&parseFloat(w.lastPrice)<=parseFloat(w.lowestSeen))?'<span class="badge badge-drop">LOW</span>':'';
    const rBadge=w.dateMode==='range'?'<span class="badge badge-range">RANGE</span>':'';
    const rtBadge=isRound?'<span class="badge badge-range">ROUND TRIP</span>':'';
    const milesBadge=w.pricing==='miles'?'<span class="badge badge-range">MILES</span>':'';
    const airlineHtml=w.airline?`<div class="card-airline">${w.airline}${w.flightNumber?' &middot; '+w.flightNumber:''}</div>`:'';
    const div=document.createElement('div');
    div.className=`card status-${sc}${!w.enabled?' status-disabled':''}`;
    div.dataset.id=w.id;
    div.innerHTML=`${airlineHtml}
      <div class="card-route">${w.origin} ${isRound?'&#8644;':'&#8594;'} ${w.destination} ${lBadge}${rBadge}${rtBadge}${milesBadge}</div>
      <div class="card-date">${dateStr} &middot; every ${CHECK_INTERVAL_MIN} min</div>
      <div class="card-prices"><div class="card-price-now${isAbove?' above-target':''}">${priceStr} ${deltaHtml}</div><div class="card-price-target">${targetStr}</div></div>
      <div class="card-meta"><span class="card-status ${sc}">${sl}</span><span class="card-checked">${w.lastChecked||'Never checked'}</span></div>
      <div class="card-actions">
        <button class="btn btn-ghost" onclick="window.open('${buildWatchUrl(w)}','_blank')">View</button>
        <button class="btn btn-ghost" onclick="openHistory('${w.id}')">History</button>
        <button class="btn btn-ghost" onclick="toggleEdit('${w.id}')">Edit</button>
        <button class="btn btn-ghost" onclick="toggleWatch('${w.id}',${!w.enabled})">${w.enabled?'Disable':'Enable'}</button>
        <button class="btn btn-danger" onclick="removeWatch('${w.id}')">Remove</button>
      </div>
      <div class="card-edit" id="edit-${w.id}">
        <div class="row2">
          <div class="field"><label>Target Price</label><input type="number" id="et-${w.id}" value="${w.targetPrice!=null?w.targetPrice:''}" placeholder="none" step="0.01"></div>
        </div>
        <button class="btn btn-primary" onclick="saveEdit('${w.id}')">SAVE</button>
      </div>`;
    return div;
}

function toggleEdit(id){document.getElementById(`edit-${id}`).classList.toggle('open');}

let watchesById = {};   // id -> watch, refreshed by renderWatches
let histChart = null;   // the dialog's Chart instance

function closeHistory() {
    document.getElementById('histModal').classList.remove('open');
    if (histChart) { try { histChart.destroy(); } catch {} histChart = null; }
}

function histStatTile(label, value, cls) {
    return `<div class="hist-stat"><div class="hs-label">${label}</div><div class="hs-value ${cls || ''}">${value}</div></div>`;
}

async function openHistory(id) {
    const w = watchesById[id];
    const cur = (w && w.currency) || 'USD';
    const modal = document.getElementById('histModal');
    const title = document.getElementById('histTitle');
    const stats = document.getElementById('histStats');
    const msg   = document.getElementById('histMsg');
    title.textContent = w ? w.label : 'Price History';
    stats.innerHTML = '';
    msg.textContent = 'Loading...';
    if (histChart) { try { histChart.destroy(); } catch {} histChart = null; }
    modal.classList.add('open');

    if (typeof Chart === 'undefined') { msg.textContent = 'Chart library unavailable.'; return; }
    try {
        const rows = await fetch(
            `${SUPABASE_URL}/rest/v1/price_log?watch_id=eq.${id}&order=checked_at.asc&limit=500`,
            { headers: SB }
        ).then(r => r.json());
        if (!Array.isArray(rows) || rows.length < 2) {
            msg.textContent = 'Not enough history yet.';
            return;
        }
        msg.textContent = '';
        const pad = n => String(n).padStart(2, '0');
        const labels = rows.map(r => {
            const d = new Date(r.checked_at);
            return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        });
        const data = rows.map(r => parseFloat(r.price));

        const lowest  = Math.min(...data);
        const highest = Math.max(...data);
        const current = data[data.length - 1];
        const change  = current - data[0];
        const changePct = data[0] !== 0 ? (change / data[0] * 100) : 0;
        const spanDays = Math.max(1, Math.round((new Date(rows[rows.length-1].checked_at) - new Date(rows[0].checked_at)) / 86400000));
        const changeCls = change < 0 ? 'down' : (change > 0 ? 'up' : '');
        const changeArrow = change < 0 ? '&#9660;' : (change > 0 ? '&#9650;' : '');
        stats.innerHTML =
            histStatTile('Current', fmtWatchPrice(cur, current)) +
            histStatTile('Lowest', fmtWatchPrice(cur, lowest), 'down') +
            histStatTile('Highest', fmtWatchPrice(cur, highest), 'up') +
            histStatTile(`Change (${spanDays}d)`, `${changeArrow} ${fmtWatchPrice(cur, Math.abs(change))} (${changePct >= 0 ? '+' : ''}${changePct.toFixed(1)}%)`, changeCls) +
            histStatTile('Checks', String(rows.length));

        histChart = new Chart(document.getElementById('histCanvas'), {
            type: 'line',
            data: { labels, datasets: [{ label: 'Price', data, borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.15)', fill: true, tension: 0.2, pointRadius: 2 }] },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmtWatchPrice(cur, c.parsed.y) } } },
                scales: {
                    x: { ticks: { maxTicksLimit: 8, color: '#94a3b8' }, grid: { color: 'rgba(148,163,184,0.1)' } },
                    y: { ticks: { color: '#94a3b8', callback: v => cur === 'MILES' ? Math.round(v).toLocaleString('en-US') : `${cur} ${v}` }, grid: { color: 'rgba(148,163,184,0.1)' } }
                }
            }
        });
    } catch (e) {
        msg.textContent = 'Could not load history.';
    }
}

async function saveEdit(id) {
    const t = document.getElementById(`et-${id}`).value.trim();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/watches?id=eq.${id}`, {
        method: 'PATCH',
        headers: { ...SB, Prefer: 'return=minimal' },

async function removeWatch(id) {
    if (!confirm('Remove this watch?')) return;

        method: 'DELETE',
        headers: SB
    });

}

function setupAirportAutocomplete(inputId) {
    const input = document.getElementById(inputId);
    const wrap  = input.parentElement;
    wrap.style.position = 'relative';
    const drop = document.createElement('div');
    drop.className = 'airport-dropdown';
    wrap.appendChild(drop);

    function showDropdown(q) {
        const hits = AIRPORTS.filter(a =>
            a.code.startsWith(q) || a.name.toUpperCase().includes(q) || a.country.startsWith(q)
        ).slice(0, 8);
        if (!hits.length) { drop.style.display = 'none'; return; }
        drop.innerHTML = hits.map(a =>
            `<div class="airport-option" data-code="${a.code}"><span class="ao-code">${a.code}</span><span class="ao-name">${a.name}</span><span class="ao-country">${a.country}</span></div>`
        ).join('');
        drop.style.display = 'block';
        drop.querySelectorAll('.airport-option').forEach(el => {
            el.addEventListener('mousedown', e => {
                e.preventDefault();
                input.value = el.dataset.code;
                drop.style.display = 'none';
            });
        });
    }

    input.addEventListener('input', () => {
        const q = input.value.trim().toUpperCase();
        if (!q) { drop.style.display = 'none'; return; }
        showDropdown(q);
    });

    input.addEventListener('keydown', e => {
        const opts = [...drop.querySelectorAll('.airport-option')];
        const active = drop.querySelector('.ao-active');
        if (e.key === 'Escape') { drop.style.display = 'none'; return; }
        if ((e.key === 'Enter' || e.key === 'Tab') && drop.style.display !== 'none') {
            const sel = active || opts[0];
            if (sel) { input.value = sel.dataset.code; drop.style.display = 'none'; if (e.key === 'Enter') e.preventDefault(); }
            return;
        }
        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
            if (drop.style.display === 'none') return;
            e.preventDefault();
            if (active) active.classList.remove('ao-active');
            let ni = e.key === 'ArrowDown' ? 0 : opts.length - 1;
            if (active) { const ci = opts.indexOf(active); ni = e.key === 'ArrowDown' ? Math.min(ci+1,opts.length-1) : Math.max(ci-1,0); }
            if (opts[ni]) opts[ni].classList.add('ao-active');
        }
    });

    input.addEventListener('blur', () => {
        setTimeout(() => { drop.style.display = 'none'; }, 150);
        const v = input.value.trim().toUpperCase();
        if (v.length > 3) input.value = v.slice(0, 3);
        else input.value = v;
    });

    document.addEventListener('click', e => { if (!wrap.contains(e.target)) drop.style.display = 'none'; });
}

document.getElementById('awSubmit').addEventListener('click', async () => {
    const err = document.getElementById('awError');
    err.textContent = '';
    const origin  = document.getElementById('awOrigin').value.trim().toUpperCase();
    const dest    = document.getElementById('awDest').value.trim().toUpperCase();
    const trip    = document.getElementById('awTrip').value;
    const date    = document.getElementById('awDate').value;
    const ret     = document.getElementById('awReturn').value;
    const airline = document.getElementById('awAirline').value.trim();
    const target  = document.getElementById('awTarget').value;
    if (!/^[A-Z]{3}$/.test(origin))       { err.textContent = 'From must be a 3-letter airport code.'; return; }
    if (!/^[A-Z]{3}$/.test(dest))         { err.textContent = 'To must be a 3-letter airport code.'; return; }
    if (!date)                            { err.textContent = 'Departure date is required.'; return; }
    if (trip === 'roundTrip' && !ret)     { err.textContent = 'Return date is required for round trip.'; return; }
    if (trip === 'roundTrip' && ret && ret < date) { err.textContent = 'Return date must be on or after departure.'; return; }
    const id = Array.from(crypto.getRandomValues(new Uint8Array(4))).map(b => b.toString(16).padStart(2, '0')).join('');
    const isRT = trip === 'roundTrip';
    const label = `${airline || 'Any'} | ${origin} ${isRT ? '<->' : '->'} ${dest} | ${isRT ? date + ' / ' + ret : date}`;
    const watch = {
        id, label, origin, destination: dest,
        dateMode: 'specific', departureDate: date,
        returnDate: isRT ? ret : null, tripType: trip,
        currency: 'USD', targetPrice: target ? parseFloat(target) : null,
        airline: airline || null, flightNumber: null, departureTime: null,
        returnAirline: null, returnFlightNumber: null, returnDepartureTime: null,
        enabled: true, status: 'Pending', lastPrice: null, lowestSeen: null,
        lastChecked: null, addedAt: new Date().toISOString()
    };
    try {
        await createWatch(watch);
        document.getElementById('addWatchForm').style.display = 'none';
        ['awOrigin','awDest','awDate','awReturn','awAirline','awTarget'].forEach(i => { document.getElementById(i).value = ''; });
        loadWatches();
        showToast('Watch added');
    } catch (e) { err.textContent = 'Error: ' + e.message; }
});
